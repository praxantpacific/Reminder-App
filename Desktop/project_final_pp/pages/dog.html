<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservation Plus – Dog Kennel Booking</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../styles/dog.css">
</head>

<body>

  <header>
    <div class="brand-row">
      <div class="brand-icon">🐾</div>
      <h1 class="brand-name">Reservation <span>Dogs</span></h1>
    </div>

    <p class="brand-tagline">
      Caring for your companion while you're away
    </p>
  </header>

  <nav class="page-nav">
    <a href="./cat.html">🐱 Cat Booking</a>
    <a href="./dog.html" class="active">🐶 Dog Booking</a>
  </nav>

  <main>
    <div class="form-card">

      <hr class="section-sep" />

      <!-- DOG INFO -->
      <p class="form-section-title">Dog Information</p>

      <div class="grid-2">
        <div class="form-group">
         <label for="dog-name">
  Dog's Name <span class="req">*</span>
</label>
          <input type="text" id="dog-name" placeholder="Buddy" required />
        </div>

        <div class="form-group">
          <label for="dog-age">Age (years)</label>
          <input type="number" id="dog-age" placeholder="2" />
        </div>
      </div>

      <hr class="section-sep" />

      <!-- BREED -->
      <p class="form-section-title">Step 1 — Select Breed Size Classification</p>

      <div class="breed-cards">

        <label class="breed-card-label">
          <input type="radio" name="breed-class" value="Toy" />
          <div class="breed-card-inner">
            <span class="breed-emoji">🐾</span>
            <span class="breed-name">Toy</span>
            <span class="breed-desc">Under 5 kg</span>
          </div>
        </label>

        <label class="breed-card-label">
          <input type="radio" name="breed-class" value="Small" />
          <div class="breed-card-inner">
            <span class="breed-emoji">🐕</span>
            <span class="breed-name">Small</span>
            <span class="breed-desc">5 – 15 kg</span>
          </div>
        </label>

        <label class="breed-card-label">
          <input type="radio" name="breed-class" value="Medium" />
          <div class="breed-card-inner">
            <span class="breed-emoji">🐕‍🦺</span>
            <span class="breed-name">Medium</span>
            <span class="breed-desc">15 – 30 kg</span>
          </div>
        </label>

      </div>

      <!-- SIZE -->
      <div id="size-section">

        <hr class="section-sep" />

        <p class="form-section-title">Step 2 — Choose a Kennel Space</p>

        <div class="size-cards">

          <label class="size-card-label">
            <input type="radio" name="kennel-size" value="Small" />
            <div class="size-card-inner">Small</div>
          </label>

          <label class="size-card-label">
            <input type="radio" name="kennel-size" value="Medium" />
            <div class="size-card-inner">Medium</div>
          </label>

          <label class="size-card-label">
            <input type="radio" name="kennel-size" value="Large" />
            <div class="size-card-inner">Large</div>
          </label>

        </div>
      </div>

      <hr class="section-sep" />

      <!-- DATES -->
      <p class="form-section-title">Stay Details</p>

      <div class="grid-2">
        <div class="form-group">
          <label for="check-in">Check-in Date</label>
          <input type="date" id="check-in" />
        </div>

        <div class="form-group">
          <label for="check-out">Check-out Date</label>
          <input type="date" id="check-out" />
        </div>
      </div>

      <!-- DURATION (ADDED) -->
      <div class="form-group">
        <label>Duration</label>
        <div class="duration-row">
          <input type="number" id="stay-days" readonly />
          <span>nights</span>
        </div>
      </div>

      <!-- SUMMARY -->
      <div class="summary-box" id="summary-box">
        <p class="summary-title">Booking Summary</p>

        <div class="summary-row">
          <span>Dog</span>
          <span id="s-dog">–</span>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn">
        Confirm Dog Kennel Reservation 🐶
      </button>

    </div>
  </main>

  <footer>© 2025 Reservation Plus</footer>

  <div class="toast" id="toast">Reservation confirmed!</div>

  <script src="../js/dog.js"></script>

</body>
</html>
